name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-scan:
    name: docker build + image scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mongomaintainer:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: mongomaintainer:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true